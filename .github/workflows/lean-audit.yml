name: Lean audit

on:
  pull_request:
    paths:
      - "lean-toolchain"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "WentworthLorell.lean"
      - "WentworthLorell/**"
      - ".github/workflows/lean-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Lean with elan
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y 2>&1 | tee lean-install.log
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean versions
        if: steps.install.outcome == 'success'
        shell: bash
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          lean --version
          lake --version

      - name: Update dependencies
        id: update
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          set -o pipefail
          lake update 2>&1 | tee lean-update.log

      - name: Build project
        id: build
        if: steps.install.outcome == 'success' && steps.update.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          set -o pipefail
          lake build 2>&1 | tee lean-build.log

      - name: Upload complete Lean logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-audit-logs
          path: |
            lean-install.log
            lean-update.log
            lean-build.log
          if-no-files-found: warn

      - name: Fail when Lean failed
        if: steps.install.outcome != 'success' || steps.update.outcome != 'success' || steps.build.outcome != 'success'
        shell: bash
        run: exit 1
