name: Lean audit

on:
  pull_request:
    paths:
      - "lean-toolchain"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "WentworthLorell.lean"
      - "WentworthLorell/**"
      - ".github/workflows/lean-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-github-cache: true

      - name: Update dependencies
        id: update
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          lake update 2>&1 | tee lean-update.log

      - name: Build project
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee lean-build.log

      - name: Upload complete Lean logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-audit-logs
          path: |
            lean-update.log
            lean-build.log
          if-no-files-found: warn

      - name: Fail when Lean failed
        if: steps.update.outcome != 'success' || steps.build.outcome != 'success'
        shell: bash
        run: exit 1
